version: '3.9'

services:
  mongo:
    image: mongo:7.0.9
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT:          "5000"
      MONGO_URI:     "mongodb://mongo:27017/civicpulse"
      CLIENT_ORIGIN: "http://localhost"
      NODE_ENV:      "production"
    depends_on:
      mongo:
        condition: service_healthy

  client:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  mongo_data:
    driver: local
